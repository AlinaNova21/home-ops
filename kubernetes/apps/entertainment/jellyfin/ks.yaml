apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: entertainment
spec:
  targetNamespace: entertainment
  components:
    - ../../../../components/kopiur/backup
  interval: 15m
  path: "./apps/entertainment/jellyfin/app"
  postBuild:
    substitute:
      APP: jellyfin
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
