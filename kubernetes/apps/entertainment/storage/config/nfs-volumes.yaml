---
# Music (entertainment namespace)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-music-entertainment
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.2.193
    path: /mnt/tank/media/music
  mountOptions:
    - nfsvers=4
    - nolock
    - soft
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-music
  namespace: entertainment
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: media-music-entertainment
  resources:
    requests:
      storage: 1Ti
