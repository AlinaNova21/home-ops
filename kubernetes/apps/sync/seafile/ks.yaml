---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seafile
  namespace: sync
spec:
  targetNamespace: sync
  components:
    - ../../../../components/kopiur/seafile-backup
  interval: 15m
  path: "./apps/sync/seafile/app"
  postBuild:
    substitute:
      APP: seafile
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: true
