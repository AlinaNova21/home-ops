---
# Seafile data storage
apiVersion: v1
kind: PersistentVolume
metadata:
  name: seafile-data
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.2.193
    path: /mnt/tank/media/storage/seafile
  mountOptions:
    - nfsvers=4
    - nolock
    - soft
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-data
  namespace: sync
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: seafile-data
  resources:
    requests:
      storage: 1Ti
