---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sabnzbd
  namespace: downloads
spec:
  targetNamespace: downloads
  components:
    - ../../../../components/kopiur/backup
  interval: 15m
  path: "./apps/downloads/sabnzbd/app"
  postBuild:
    substitute:
      APP: sabnzbd
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: downloads-storage
  timeout: 10m
  wait: true
  prune: true
