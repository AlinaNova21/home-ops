---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr-anime
  namespace: downloads
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - whoverse-w1
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "Always"

    controllers:
      sonarr-anime:
        strategy: Recreate
        containers:
          sonarr-anime:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.18@sha256:2cd77fb3d81909a734d61bb8f71462044cb9d2f187e626a28a05a5c4e4be8fd2
            env:
              TZ: "America/Chicago"
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: Enabled
              SONARR__LOG__LEVEL: info
              SONARR__SERVER__PORT: "8989"
              SONARR__UPDATE__BRANCH: main
              SONARR__UPDATE__MECHANISM: External
              SONARR__UPDATE__EXTERNALMESSAGE: "Updates are managed via GitOps"
              SONARR__AUTH__APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: sonarr-anime-config
                    key: apikey
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8989
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8989
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      sonarr-anime:
        controller: sonarr-anime
        ports:
          http:
            port: 8989

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-rbd
        globalMounts:
          - path: /config
      downloads:
        existingClaim: downloads-sabnzbd
        globalMounts:
          - path: /downloads/sabnzbd
      tv-anime:
        existingClaim: media-tv-anime
        globalMounts:
          - path: /data/tv/anime
