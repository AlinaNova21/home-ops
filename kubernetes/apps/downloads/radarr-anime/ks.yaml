---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radarr-anime
  namespace: downloads
spec:
  targetNamespace: downloads
  components:
    - ../../../../components/kopiur/backup
  interval: 15m
  path: "./apps/downloads/radarr-anime/app"
  postBuild:
    substitute:
      APP: radarr-anime
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: true
