---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr-secrets
  namespace: downloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: recyclarr-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        secrets.yml: |
          # Radarr instance URLs
          radarr_hd_url: http://radarr-hd.downloads.svc.cluster.local:7878
          radarr_uhd_url: http://radarr-uhd.downloads.svc.cluster.local:7878
          radarr_anime_url: http://radarr-anime.downloads.svc.cluster.local:7878

          # Sonarr instance URLs
          sonarr_hd_url: http://sonarr-hd.downloads.svc.cluster.local:8989
          sonarr_anime_url: http://sonarr-anime.downloads.svc.cluster.local:8989

          # API Keys (shared per service)
          radarr_apikey: {{ .radarr_apikey }}
          sonarr_apikey: {{ .sonarr_apikey }}
  data:
    - secretKey: radarr_apikey
      remoteRef:
        key: radarr
        property: credential
    - secretKey: sonarr_apikey
      remoteRef:
        key: sonarr
        property: credential
