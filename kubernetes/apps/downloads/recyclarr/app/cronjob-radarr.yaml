---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-sync-radarr
  namespace: downloads
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              imagePullPolicy: IfNotPresent
              command:
                - recyclarr
                - sync
                - radarr
                - -c
                - /config/radarr-hd.yml
                - -c
                - /config/radarr-uhd.yml
                - -c
                - /config/radarr-anime.yml
              volumeMounts:
                - name: radarr-configs
                  mountPath: /config/radarr-hd.yml
                  subPath: radarr-hd.yml
                  readOnly: true
                - name: radarr-configs
                  mountPath: /config/radarr-uhd.yml
                  subPath: radarr-uhd.yml
                  readOnly: true
                - name: radarr-configs
                  mountPath: /config/radarr-anime.yml
                  subPath: radarr-anime.yml
                  readOnly: true
                - name: secrets
                  mountPath: /config/secrets.yml
                  subPath: secrets.yml
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          volumes:
            - name: radarr-configs
              configMap:
                name: recyclarr-radarr-configs
            - name: secrets
              secret:
                secretName: recyclarr-secrets
