---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
  namespace: downloads
spec:
  interval: 15m
  path: "./apps/downloads/recyclarr/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: radarr-hd
    - name: radarr-uhd
    - name: radarr-anime
    - name: sonarr-hd
    - name: sonarr-anime
  timeout: 5m
  wait: true
  prune: false
