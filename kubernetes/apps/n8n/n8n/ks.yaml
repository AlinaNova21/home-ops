apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: n8n
  namespace: n8n
spec:
  dependsOn:
    - name: external-secrets-config
      namespace: external-secrets-system
  interval: 15m
  path: ./apps/n8n/n8n/app
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
