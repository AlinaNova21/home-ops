apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

    controllers:
      n8n:
        containers:
          n8n:
            image:
              repository: n8nio/n8n
              tag: latest
            env:
              TZ: America/Chicago
              DB_TYPE: sqlite
              N8N_HOST: n8n.whoverse.nexus
              WEBHOOK_URL: https://n8n.whoverse.nexus
              N8N_EMAIL_MODE: smtp
              N8N_SMTP_HOST: mailpit.default.svc.cluster.local
              N8N_SMTP_PORT: "1025"
              N8N_SMTP_SSL: "false"
              N8N_SMTP_SENDER: n8n@whoverse.dev
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
              N8N_RUNNERS_ENABLED: "true"
              N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
              N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
              N8N_PROXY_HOPS: "1"
              N8N_RESTRICT_FILE_ACCESS_TO: "~/.n8n-files;/var/run/secrets/kubernetes.io/serviceaccount/token"
              N8N_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secrets
                    key: encryption-key
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 5678
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 5678
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      n8n:
        controller: n8n
        ports:
          http:
            port: 5678

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-rbd
        globalMounts:
          - path: /home/node/.n8n
