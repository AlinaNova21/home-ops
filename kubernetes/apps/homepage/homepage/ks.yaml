---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 15m
  path: "./apps/homepage/homepage/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: homepage
      namespace: homepage
  timeout: 10m
  wait: true
  prune: false
