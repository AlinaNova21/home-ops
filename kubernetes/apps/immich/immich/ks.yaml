---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: immich
spec:
  dependsOn:
    - name: cloudnative-pg-config
  interval: 15m
  path: "./apps/immich/immich/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-config
  namespace: immich
spec:
  dependsOn:
    - name: external-secrets-config
  interval: 10m
  path: "./apps/immich/immich/config"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 5m
  wait: true
  prune: true
