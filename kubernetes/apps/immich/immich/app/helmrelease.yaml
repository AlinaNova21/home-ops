apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: immich
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  dependsOn:
  - name: immich-redis
    namespace: immich
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    controllers:
      # Main Immich server
      server:
        containers:
          server:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v1.144.1
            env:
              # Database connection
              DATABASE_HOST: homelab-postgres-rw.databases.svc.cluster.local
              DATABASE_PORT: "5432"
              DATABASE_NAME: immich
              # Redis connection
              REDIS_HOSTNAME: immich-redis
              REDIS_PORT: "6379"
              # Microservices
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              # Public URL
              IMMICH_SERVER_URL: https://photos.whoverse.dev
              IMMICH_WEB_URL: https://photos.whoverse.dev
            envFrom:
              - secretRef:
                  name: immich-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server-info/ping
                    port: 3001
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server-info/ping
                    port: 3001
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi

      # Microservices (background jobs)
      microservices:
        containers:
          microservices:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v1.144.1
            command:
              - /bin/sh
            args:
              - -c
              - /usr/src/app/start-microservices.sh
            env:
              DATABASE_HOST: homelab-postgres-rw.databases.svc.cluster.local
              DATABASE_PORT: "5432"
              DATABASE_NAME: immich
              REDIS_HOSTNAME: immich-redis
              REDIS_PORT: "6379"
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
            envFrom:
              - secretRef:
                  name: immich-secrets
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 2Gi

      # Machine Learning
      machine-learning:
        containers:
          machine-learning:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v1.144.1
            env:
              TRANSFORMERS_CACHE: /cache
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi

    service:
      server:
        controller: server
        ports:
          http:
            port: 3001
      microservices:
        controller: microservices
        ports:
          http:
            port: 3002
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003

    persistence:
      # Photo upload storage
      uploads:
        type: persistentVolumeClaim
        size: 500Gi  # Adjust based on photo collection
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /usr/src/app/upload
            subPath: uploads
      # ML model cache
      cache:
        type: persistentVolumeClaim
        size: 10Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /cache
            subPath: cache

---
# Redis for Immich
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-redis
  namespace: immich
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: immich
  values:
    controllers:
      redis:
        containers:
          redis:
            image:
              repository: redis
              tag: 8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
            command:
              - redis-server
            args:
              - --requirepass
              - $(REDIS_PASSWORD)
            env:
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secrets
                    key: REDIS_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - redis-cli
                      - --raw
                      - incr
                      - ping
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - redis-cli
                      - --raw
                      - incr
                      - ping
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 256Mi

    service:
      redis:
        controller: redis
        ports:
          redis:
            port: 6379

    persistence:
      data:
        type: persistentVolumeClaim
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data
