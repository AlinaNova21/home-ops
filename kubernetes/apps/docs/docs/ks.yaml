---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docs
  namespace: docs
spec:
  interval: 15m
  path: "./apps/docs/docs/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: docs
      namespace: docs
  timeout: 10m
  wait: true
  prune: true
