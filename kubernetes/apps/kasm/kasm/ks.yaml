apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kasm
  namespace: kasm
spec:
  interval: 15m
  path: "./apps/kasm/kasm/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: infrastructure
      namespace: flux-system
  timeout: 10m
  wait: true
  prune: false