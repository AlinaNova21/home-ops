apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kasm
  namespace: kasm
spec:
  interval: 15m
  chart:
    spec:
      chart: kasm
      version: "1.1181.0"
      sourceRef:
        kind: HelmRepository
        name: kasm-helm
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    deploymentSize: small
    publicAddr: kasm.whoverse.nexus
    database:
      standalone: true
      hostname: homelab-postgres-rw.databases.svc.cluster.local
      port: 5432
      kasmDbName: kasm
      kasmDbUser: kasmapp
      kasmDbSecret:
        name: kasm-secrets
        key: db-password
    proxyService:
      type: ClusterIP
    certificate:
      secretName: kasm-proxy-cert
      certManager:
        enabled: true
        issuerName: letsencrypt-prod
        issuerKind: ClusterIssuer
    components:
      guac:
        enabled: false