---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memos
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controllers:
      memos:
        containers:
          memos:
            image:
              repository: neosmemo/memos
              tag: stable
            env:
              MEMOS_PG_USER:
                valueFrom:
                  secretKeyRef:
                    name: memos-postgres-app
                    key: username
              MEMOS_PG_PASS:
                valueFrom:
                  secretKeyRef:
                    name: memos-postgres-app
                    key: password
              MEMOS_PG_HOST:
                valueFrom:
                  secretKeyRef:
                    name: memos-postgres-app
                    key: host
              MEMOS_PG_DB:
                valueFrom:
                  secretKeyRef:
                    name: memos-postgres-app
                    key: dbname
              MEMOS_DRIVER: postgres
              MEMOS_DSN: "postgresql://$(MEMOS_PG_USER):$(MEMOS_PG_PASS)@$(MEMOS_PG_HOST)/$(MEMOS_PG_DB)"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      memos:
        controller: memos
        ports:
          http:
            port: 5230

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-rbd
        globalMounts:
          - path: /var/opt/memos
