apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: error-pages-external
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: error-pages
      sourceRef:
        kind: HelmRepository
        name: tarampampam-error-pages
        namespace: flux-system
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    config:
      sendSameHttpCode: true
      htmlTemplate:
        name: cats
