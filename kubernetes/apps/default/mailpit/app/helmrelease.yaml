---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailpit
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: '5.0.1'
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    global:
      labels:
        app.kubernetes.io/name: mailpit
        app.kubernetes.io/component: mail-testing

    controllers:
      mailpit:
        containers:
          mailpit:
            image:
              repository: axllent/mailpit
              tag: v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
              pullPolicy: Always
            env:
              MP_MAX_MESSAGES: 5000
              MP_DATABASE: /data/mailpit.db
              MP_SMTP_AUTH_ACCEPT_ANY: 1
              MP_SMTP_AUTH_ALLOW_INSECURE: 1
            ports:
              - name: http
                containerPort: 8025
                protocol: TCP
              - name: smtp
                containerPort: 1025
                protocol: TCP
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      mailpit:
        controller: mailpit
        ports:
          http:
            port: 8025
            targetPort: http
            protocol: TCP
          smtp:
            port: 1025
            targetPort: smtp
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-rbd
        advancedMounts:
          mailpit:
            mailpit:
              - path: /data
