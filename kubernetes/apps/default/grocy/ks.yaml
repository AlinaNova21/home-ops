---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grocy
  namespace: default
spec:
  targetNamespace: default
  components:
    - ../../../../components/kopiur/backup
  interval: 30m
  path: ./apps/default/grocy/app
  postBuild:
    substitute:
      APP: grocy
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
