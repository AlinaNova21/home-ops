---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: speedtest-tracker
  namespace: default
spec:
  targetNamespace: default
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: default-database
  interval: 30m
  path: ./apps/default/speedtest-tracker/app
  postBuild:
    substitute:
      APP: speedtest-tracker
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
