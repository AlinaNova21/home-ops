---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.87.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    # Gives the VMCluster CR a predictable name so the operator creates
    # services named vmselect-victoria-metrics, vminsert-victoria-metrics, etc.
    fullnameOverride: victoria-metrics

    # Disable single-node VM in favour of cluster mode
    vmsingle:
      enabled: false

    vmcluster:
      enabled: true
      spec:
        replicationFactor: 2
        retentionPeriod: "30d"
        vmstorage:
          replicaCount: 3
          storageDataPath: /vm-data
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: openebs-hostpath
                resources:
                  requests:
                    storage: 50Gi
        vminsert:
          replicaCount: 2
        vmselect:
          replicaCount: 2
          cacheMountPath: /select-cache
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: openebs-hostpath
                resources:
                  requests:
                    storage: 2Gi

    # Metrics scraping agent — additional targets via VMServiceScrape/VMPodScrape CRDs
    vmagent:
      enabled: true
      spec:
        selectAllByDefault: true
        scrapeInterval: 30s

    # Bundled exporters — auto-discovered via CRDs with selectAllByDefault
    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true

    # Disable bundled Grafana — we deploy separately
    grafana:
      enabled: false

    # Enable Alertmanager
    alertmanager:
      enabled: true
      alertmanagerSpec:
        externalUrls:
          - namespace: monitoring
            url: "https://alerts.whoverse.dev"

    # Disable VMAlert — no notifier configured
    vmalert:
      enabled: false

    defaultDashboardsEnabled: false
