---
apiVersion: operator.victoriametrics.com/v1beta1
kind: PrometheusRule
metadata:
  name: node-alerts
  namespace: monitoring
spec:
  groups:
    - name: node_alerts
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="false"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been NotReady for more than 2 minutes. Status: {{ $labels.condition }}"

        - alert: NodeDiskSpaceLow
          expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk space low"
            description: "Disk usage is above 85% on {{ $labels.instance }} ({{ $value | printf \"%.0f\" }}%)"

        - alert: NodeHighCPU
          expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} high CPU usage"
            description: "CPU usage is above 80% on {{ $labels.instance }} ({{ $value | printf \"%.0f\" }}%)"

        - alert: NodeHighMemory
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} high memory usage"
            description: "Memory usage is above 85% on {{ $labels.instance }} ({{ $value | printf \"%.0f\" }}%)"