---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-logs-cluster
      version: "0.2.8"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
      interval: 24h
  timeout: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    vlinsert:
      replicaCount: 2
      resources:
        requests:
          memory: 64Mi

    vlstorage:
      replicaCount: 2
      resources:
        requests:
          memory: 128Mi
      persistentVolume:
        enabled: true
        storageClassName: openebs-hostpath
        size: 20Gi
      # Spread storage replicas across different nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: vlstorage
              topologyKey: kubernetes.io/hostname

    vlselect:
      replicaCount: 2
      resources:
        requests:
          memory: 64Mi
