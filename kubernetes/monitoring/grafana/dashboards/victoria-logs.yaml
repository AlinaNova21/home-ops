---
# VictoriaLogs explorer dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-victoria-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  victoria-logs.json: |
    {
      "__inputs": [
        {
          "name": "DS_VICTORIALOGS",
          "label": "VictoriaLogs",
          "type": "datasource",
          "pluginId": "victoriametrics-logs-datasource"
        }
      ],
      "__requires": [],
      "annotations": {"list": []},
      "description": "VictoriaLogs log explorer",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["logs", "victorialogs"],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "title": "VictoriaLogs Explorer",
      "uid": "victoria-logs-explorer",
      "version": 1
    }
