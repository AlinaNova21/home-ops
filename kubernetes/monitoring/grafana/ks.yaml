---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  path: "./monitoring/grafana/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: victoria-metrics
  timeout: 10m
  wait: true
  prune: false
