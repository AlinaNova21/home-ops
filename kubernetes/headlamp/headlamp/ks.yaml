apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  path: "./headlamp/headlamp/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 5m
  wait: true
  prune: false
  dependsOn:
    - name: dex-security-policies
      namespace: auth
