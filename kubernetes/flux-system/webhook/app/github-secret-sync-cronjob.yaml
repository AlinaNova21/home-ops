---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-secret-sync
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-secret-sync
  namespace: flux-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-secret-sync
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-secret-sync
subjects:
  - kind: ServiceAccount
    name: github-secret-sync
    namespace: flux-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: github-secret-sync
  namespace: flux-system
spec:
  # Suspended until image pull issue is fixed
  suspend: true
  # Run every 6 hours
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: github-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/cli/cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Fetching webhook-token secret from Kubernetes..."

                  # Get the secret value from Kubernetes
                  TOKEN=$(cat /var/run/secrets/webhook-token/token)

                  if [ -z "$TOKEN" ]; then
                    echo "ERROR: webhook-token is empty!"
                    exit 1
                  fi

                  echo "Authenticating with GitHub..."
                  echo "$GH_TOKEN" | gh auth login --with-token

                  echo "Setting FLUX_WEBHOOK_TOKEN secret in GitHub Actions..."
                  echo "$TOKEN" | gh secret set FLUX_WEBHOOK_TOKEN \
                    --repo alinanova21/home-ops \
                    --app actions

                  echo "Secret sync completed successfully!"
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-pat
                      key: token
              volumeMounts:
                - name: webhook-token
                  mountPath: /var/run/secrets/webhook-token
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65534
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          volumes:
            - name: webhook-token
              secret:
                secretName: webhook-token
