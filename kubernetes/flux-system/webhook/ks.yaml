---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-webhook
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
      namespace: external-secrets-system
  interval: 30m
  path: "./flux-system/webhook/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
  timeout: 5m
  wait: true
  prune: false
