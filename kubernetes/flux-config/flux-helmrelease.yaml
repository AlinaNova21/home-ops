apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux2
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: flux2
      version: '2.19.0'
      sourceRef:
        kind: HelmRepository
        name: fluxcd-community
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    installCRDs: true
    controllers:
      source:
        enabled: true
      kustomize:
        enabled: true
      helm:
        enabled: true
      notification:
        enabled: true
      image:
        enabled: true
    policies:
      create: false
    kustomizeController:
      container:
        additionalArgs:
          - --concurrent=16
          - --requeue-dependency=5s
    helmController:
      container:
        additionalArgs:
          - --concurrent=16
    sourceController:
      container:
        additionalArgs:
          - --requeue-dependency=5s