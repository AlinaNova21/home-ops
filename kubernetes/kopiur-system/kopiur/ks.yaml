---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur
  namespace: kopiur-system
spec:
  interval: 1h
  path: "./kopiur-system/kopiur/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  prune: false
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
  namespace: kopiur-system
spec:
  dependsOn:
    - name: kopiur
  interval: 1h
  path: "./kopiur-system/kopiur/repository"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  prune: false
  wait: false
