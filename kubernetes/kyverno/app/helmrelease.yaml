---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "3.8.2"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    admissionController:
      replicas: 1
    backgroundController:
      enabled: true
    cleanupController:
      enabled: true
    reportsController:
      enabled: true
