---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: storage
spec:
  interval: 30m
  path: "./storage/volsync/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: rook-ceph
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: volsync
      namespace: storage
  timeout: 10m
  wait: true
  prune: false
