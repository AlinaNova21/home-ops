---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: storage
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  dependsOn:
    - name: rook-ceph-operator
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: flux-system
  values:
    operatorNamespace: storage

    toolbox:
      enabled: true

    monitoring:
      enabled: false

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-rbdplugin-snapclass
      deletionPolicy: Delete
      isDefault: false

    cephClusterSpec:
      mon:
        count: 3
        allowMultiplePerNode: false
        volumeClaimTemplate:
          spec:
            storageClassName: openebs-hostpath
            resources:
              requests:
                storage: 10Gi
      mgr:
        count: 1
        allowMultiplePerNode: false
      dashboard:
        enabled: true
        ssl: false
      resources:
        mon:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
        mgr:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
        osd:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 1Gi
        logcollector:
          limits:
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 100Mi
      storage:
        useAllNodes: true
        useAllDevices: false
        devicePathFilter: "^/dev/disk/by-partlabel/r-rook-osd$"

    # RBD pool with 2-way replication
    cephBlockPools:
      - name: rbd-pool
        spec:
          failureDomain: host
          replicated:
            size: 2
        storageClass:
          enabled: true
          name: ceph-rbd
          isDefault: false
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            imageFormat: "2"
            imageFeatures: layering
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage
            csi.storage.k8s.io/fstype: ext4

    # Disable features we don't need
    cephFileSystems: []
    cephObjectStores: []
