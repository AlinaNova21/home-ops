---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs-localpv
  namespace: storage
spec:
  interval: 30m
  chart:
    spec:
      chart: openebs
      version: "4.5.1"
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    # Disable all engines except localpv hostpath
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
        rawfile:
          enabled: false
      replicated:
        mayastor:
          enabled: false

    # Disable loki/monitoring
    loki:
      enabled: false

    # Configure localpv-provisioner for hostpath
    localpv-provisioner:
      localpv:
        # Base path for hostpath volumes - matches Talos userVolume mount
        basePath: "/var/mnt/hostpath"
      hostpathClass:
        enabled: true
        name: "openebs-hostpath"
        isDefaultClass: true
        reclaimPolicy: Delete
        basePath: "/var/mnt/hostpath"
