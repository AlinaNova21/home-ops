---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile
  namespace: sync
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controllers:
      # Main Seafile server
      seafile:
        replicas: 0
        containers:
          seafile:
            image:
              repository: seafileltd/seafile-pro-mc
              tag: 13.0-latest@sha256:4463ab7608171ed8507d1863483de656fa16eb30bd049370c814624c35ef9c1c
            env:
              TIME_ZONE: "America/Chicago"
              SEAFILE_SERVER_HOSTNAME: seafile.whoverse.dev
              SEAFILE_SERVER_PROTOCOL: https
              # Database configuration
              DB_HOST: seafile-mariadb
              DB_PORT: "3306"
              DB_USER: seafile
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: mysql_password
              DB_ROOT_PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: mysql_root_password
              # Admin account (first run only)
              INIT_SEAFILE_ADMIN_EMAIL:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: admin_email
              INIT_SEAFILE_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: admin_password
              # JWT authentication
              JWT_PRIVATE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: jwt_private_key
              # Cache configuration
              CACHE_PROVIDER: redis
              REDIS_HOST: seafile-redis
              REDIS_PORT: "6379"
              MEMCACHED_HOST: seafile-memcached
              MEMCACHED_PORT: "11211"
              # S3 storage backend (Backblaze B2)
              INIT_S3_STORAGE_BACKEND_CONFIG: "true"
              INIT_S3_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_key_id
              INIT_S3_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_secret_key
              INIT_S3_COMMIT_BUCKET:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_bucket_commits
              INIT_S3_FS_BUCKET:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_bucket_fs
              INIT_S3_BLOCK_BUCKET:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_bucket_blocks
              INIT_S3_HOST:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: s3_endpoint
              INIT_S3_USE_V4_SIGNATURE: "true"
              INIT_S3_USE_HTTPS: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api2/ping/
                    port: 80
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api2/ping/
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

      # MariaDB database
      mariadb:
        containers:
          mariadb:
            image:
              repository: mariadb
              tag: "10.11"
            env:
              MYSQL_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: mysql_root_password
              MYSQL_USER: seafile
              MYSQL_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: seafile-config
                    key: mysql_password
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mysqladmin
                      - ping
                      - -h
                      - localhost
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mysqladmin
                      - ping
                      - -h
                      - localhost
                  initialDelaySeconds: 10
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

      # Redis cache
      redis:
        containers:
          redis:
            image:
              repository: redis
              tag: 8.8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - redis-cli
                      - ping
                  initialDelaySeconds: 15
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - redis-cli
                      - ping
                  initialDelaySeconds: 5
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

      # Memcached (required for Seafile Pro)
      memcached:
        containers:
          memcached:
            image:
              repository: memcached
              tag: 1.6-alpine
            args:
              - "-m"
              - "256"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 11211
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 11211
                  initialDelaySeconds: 5
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi

    service:
      seafile:
        controller: seafile
        type: LoadBalancer
        annotations:
          tailscale.com/hostname: seafile
          tailscale.com/proxy-group: ingress-proxies
        loadBalancerClass: tailscale
        ports:
          http:
            port: 80
      mariadb:
        controller: mariadb
        ports:
          mysql:
            port: 3306
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
      memcached:
        controller: memcached
        ports:
          memcached:
            port: 11211

    persistence:
      # Seafile shared volume - image symlinks conf/logs/data here
      shared:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-rbd
        advancedMounts:
          seafile:
            seafile:
              - path: /shared
      # MariaDB data on ceph-rbd
      mariadb-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-rbd
        advancedMounts:
          mariadb:
            mariadb:
              - path: /var/lib/mysql
      # Redis data on ceph-rbd
      redis-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-rbd
        advancedMounts:
          redis:
            redis:
              - path: /data
