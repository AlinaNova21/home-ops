---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-anime-config
  namespace: downloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: radarr-anime-config
    creationPolicy: Owner
  data:
    - secretKey: apikey
      remoteRef:
        key: radarr
        property: credential
