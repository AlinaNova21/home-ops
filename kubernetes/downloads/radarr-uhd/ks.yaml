---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radarr-uhd
  namespace: downloads
spec:
  targetNamespace: downloads
  components:
        - ../../../components/kopiur/backup
  interval: 15m
  path: "./downloads/radarr-uhd/app"
  postBuild:
    substitute:
      APP: radarr-uhd
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
