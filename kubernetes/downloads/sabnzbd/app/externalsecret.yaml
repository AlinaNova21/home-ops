---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sabnzbd-config
  namespace: downloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: sabnzbd-config
    creationPolicy: Owner
  data:
    - secretKey: apikey
      remoteRef:
        key: sabnzbd
        property: credential
    - secretKey: nzbkey
      remoteRef:
        key: sabnzbd
        property: nzb-key
