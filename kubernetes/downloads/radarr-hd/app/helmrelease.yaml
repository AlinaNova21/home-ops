---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr-hd
  namespace: downloads
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - whoverse-w1
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "Always"

    controllers:
      radarr-hd:
        strategy: Recreate
        containers:
          radarr-hd:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.4.0@sha256:c82ca292d70ac798bc993421fa7467b0c760238db646a1abc7789115d4359d5c
            env:
              TZ: "America/Chicago"
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: Enabled
              RADARR__LOG__LEVEL: info
              RADARR__SERVER__PORT: "7878"
              RADARR__UPDATE__BRANCH: master
              RADARR__UPDATE__MECHANISM: External
              RADARR__UPDATE__EXTERNALMESSAGE: "Updates are managed via GitOps"
              RADARR__AUTH__APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: radarr-hd-config
                    key: apikey
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 7878
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 7878
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      radarr-hd:
        controller: radarr-hd
        ports:
          http:
            port: 7878

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-rbd
        globalMounts:
          - path: /config
      downloads:
        existingClaim: downloads-sabnzbd
        globalMounts:
          - path: /downloads/sabnzbd
      movies-hd:
        existingClaim: media-movies-hd
        globalMounts:
          - path: /data/movies/hd
