# Cilium bootstrap values for Talos
ipam:
  mode: kubernetes

kubeProxyReplacement: true

# BPF settings
bpf:
  masquerade: true
  hostLegacyRouting: false

# Device detection for bridge interface
devices:
  - br0

# Talos-specific settings
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos API server proxy
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445

# Features
bgpControlPlane:
  enabled: true
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Disabled features for bootstrap simplicity
gatewayAPI:
  enabled: false
hubble:
  enabled: false
envoy:
  enabled: false

operator:
  replicas: 1
