---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.6"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    ipam:
      mode: kubernetes
    kubeProxyReplacement: true
    bpf:
      masquerade: true
      hostLegacyRouting: true
      lbExternalClusterIP: true
    devices:
      - br0
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    bgpControlPlane:
      enabled: true
    l2announcements:
      enabled: true
    gatewayAPI:
      enabled: false
    operator:
      replicas: 1
      resources:
        requests:
          memory: 128Mi
    hubble:
      enabled: true
      relay:
        enabled: true
        resources:
          requests:
            memory: 64Mi
      ui:
        enabled: true
        backend:
          resources:
            requests:
              memory: 64Mi
        frontend:
          resources:
            requests:
              memory: 64Mi
        service:
          type: NodePort
          nodePort: 31234
    envoy:
      enabled: false
    # Top-level resources: applies to the cilium-agent DaemonSet container
    # (the chart's 'agent:' key is a boolean enable flag, not a config block).
    resources:
      requests:
        memory: 512Mi
    socketLB:
      enabled: true
      hostNamespaceOnly: true
