---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controllers:
      main:
        replicas: 1
        containers:
          app:
            image:
              repository: cloudflare/cloudflared
              tag: "2026.7.3@sha256:e39ee8da81ad5e05d77f38d2f51c60ca51bf2a8450ac3abab50c17fdb91d91bf"
              pullPolicy: IfNotPresent
            args:
              - tunnel
              - --no-autoupdate
              - --protocol
              - http2
              - --metrics
              - 0.0.0.0:2000
              - run
              - --token
              - $(TUNNEL_TOKEN)
            env:
              TUNNEL_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: cloudflared-credentials
                    key: tunnel-token
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 2000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 2000
                  initialDelaySeconds: 15
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      main:
        controller: main
        ports:
          metrics:
            port: 2000
            protocol: TCP
