---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared
  namespace: network
spec:
  dependsOn:
    - name: external-secrets-config
      namespace: external-secrets-system
  interval: 30m
  path: "./network/cloudflared/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cloudflared
      namespace: network
  timeout: 10m
  wait: true
  prune: false
