---
# Pulls the envoy-internal client secret into the headlamp namespace
# so SecurityPolicy (which must be co-located with its HTTPRoute) can reference it
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-envoy-client-secret
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: dex-envoy-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: dex-clients
        property: envoy-internal-secret
