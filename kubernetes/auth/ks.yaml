---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dex-internal
  namespace: auth
spec:
  dependsOn:
    - name: external-secrets
      namespace: external-secrets-system
    - name: onepassword-connect
      namespace: onepassword-connect
    - name: envoy-gateway-config
      namespace: network
  interval: 30m
  path: "./auth/dex-internal/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dex-external
  namespace: auth
spec:
  dependsOn:
    - name: external-secrets
      namespace: external-secrets-system
    - name: onepassword-connect
      namespace: onepassword-connect
    - name: envoy-gateway-config
      namespace: network
  interval: 30m
  path: "./auth/dex-external/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dex-security-policies
  namespace: auth
spec:
  dependsOn:
    - name: dex-internal
    - name: external-secrets
      namespace: external-secrets-system
    - name: onepassword-connect
      namespace: onepassword-connect
  interval: 10m
  path: "./auth/security-policies"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 5m
  wait: true
  prune: false
