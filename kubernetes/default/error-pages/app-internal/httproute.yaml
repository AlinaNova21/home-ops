---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: errors-whoverse-dev
  namespace: default
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: http
    - name: internal
      namespace: network
      sectionName: https
  hostnames:
    - errors.whoverse.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: error-pages-internal
          port: 8080
