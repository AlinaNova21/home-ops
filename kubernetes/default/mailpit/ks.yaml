---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mailpit
  namespace: default
spec:
  targetNamespace: default
  components:
        - ../../../components/kopiur/backup
  interval: 30m
  path: "./default/mailpit/app"
  postBuild:
    substitute:
      APP: mailpit
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 5m
  wait: true
  prune: false
