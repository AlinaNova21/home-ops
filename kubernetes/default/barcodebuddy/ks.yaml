---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: barcodebuddy
  namespace: default
spec:
  targetNamespace: default
  components:
        - ../../../components/kopiur/backup
  interval: 30m
  path: ./default/barcodebuddy/app
  postBuild:
    substitute:
      APP: barcodebuddy
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
