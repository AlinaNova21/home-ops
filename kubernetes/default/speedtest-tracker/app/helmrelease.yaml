---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: speedtest-tracker
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    controllers:
      speedtest-tracker:
        containers:
          speedtest-tracker:
            image:
              repository: lscr.io/linuxserver/speedtest-tracker
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              APP_KEY:
                valueFrom:
                  secretKeyRef:
                    name: speedtest-secrets
                    key: app-key
              DB_CONNECTION: sqlite
              APP_URL: "https://speedtest.whoverse.dev"
              ASSET_URL: "https://speedtest.whoverse.dev"
              DISPLAY_TIMEZONE: America/Chicago
              PUBLIC_DASHBOARD: "true"
              SPEEDTEST_SCHEDULE: "0 * * * *"
              PRUNE_RESULTS_OLDER_THAN: "30"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: whoverse-w1

    service:
      speedtest-tracker:
        controller: speedtest-tracker
        ports:
          http:
            port: 80

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-rbd
        globalMounts:
          - path: /config
