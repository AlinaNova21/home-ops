---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  path: "./infrastructure/kyverno/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 10m
  wait: true
  prune: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-rbac
  namespace: kyverno
spec:
  interval: 30m
  path: "./infrastructure/kyverno/rbac"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: kyverno
  timeout: 5m
  wait: true
  prune: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-policies
  namespace: kyverno
spec:
  interval: 30m
  path: "./infrastructure/kyverno/policies"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: kyverno-rbac
  timeout: 5m
  wait: true
  prune: false
