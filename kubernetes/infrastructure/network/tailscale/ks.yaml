---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
  namespace: network
spec:
  interval: 30m
  path: "./infrastructure/network/tailscale/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: external-secrets-config
      namespace: external-secrets-system
  timeout: 10m
  wait: true
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator-config
  namespace: network
spec:
  interval: 10m
  path: "./infrastructure/network/tailscale/config"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: tailscale-operator
  timeout: 5m
  wait: true
  prune: true
