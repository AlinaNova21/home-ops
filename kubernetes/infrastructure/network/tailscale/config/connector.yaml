---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: exit-node
  namespace: network
spec:
  # Enable exit node functionality (routes all traffic: 0.0.0.0/0, ::/0)
  exitNode: true

  # High availability - 2 replicas for failover
  replicas: 2

  # Hostname prefix - each replica gets suffix -0, -1
  hostnamePrefix: whoverse-exit-node

  proxyClass: low-resources
