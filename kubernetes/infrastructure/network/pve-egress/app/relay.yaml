---
apiVersion: v1
kind: Service
metadata:
  name: pve-relay
  namespace: network
spec:
  type: ClusterIP
  selector:
    app: pve-relay
  ports:
    - name: https
      port: 8006
      targetPort: 8006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-relay
  namespace: network
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pve-relay
  template:
    metadata:
      labels:
        app: pve-relay
    spec:
      containers:
        - name: haproxy
          image: haproxy:2.9-alpine
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
      volumes:
        - name: config
          configMap:
            name: pve-relay-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pve-relay-config
  namespace: network
data:
  haproxy.cfg: |
    defaults
      mode tcp
      option tcp-check
      timeout connect 5s
      timeout client 30s
      timeout server 30s

    frontend pve-relay
      bind *:8006
      default_backend pve-backends

    backend pve-backends
      server pve1 pve1-egress.network.svc.cluster.local:8006 check inter 2s fall 2 rise 1
      server pve4 pve4-egress.network.svc.cluster.local:8006 check inter 2s fall 2 rise 1 backup
