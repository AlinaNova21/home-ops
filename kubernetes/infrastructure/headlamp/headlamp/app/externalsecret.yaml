---
# Provides the OIDC client secret for Headlamp's native login (inner layer)
# Uses the 'kubernetes' dex static client (already trusted by kube-apiserver)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc-secret
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: headlamp-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: dex-clients
        property: kubernetes-secret
