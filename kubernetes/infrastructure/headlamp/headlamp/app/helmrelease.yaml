apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  valuesFrom:
    - kind: Secret
      name: headlamp-oidc-secret
      valuesKey: clientSecret
      targetPath: config.oidc.clientSecret
  values:
    config:
      baseURL: ""
      watchPlugins: true
      oidc:
        clientID: "kubernetes"
        issuerURL: "https://dex.whoverse.dev"
        scopes: "openid,profile,email,groups"
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.5.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
          - name: prometheus
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_prometheus
            version: 0.3.0
          - name: plugin-catalog
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_plugin-catalog
            version: 0.2.0
        installOptions:
          parallel: true
    service:
      port: 4466
