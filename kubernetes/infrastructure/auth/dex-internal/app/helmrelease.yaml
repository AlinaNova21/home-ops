---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex-internal
  namespace: auth
spec:
  interval: 30m
  chart:
    spec:
      chart: dex
      version: ">=0.19.0"
      sourceRef:
        kind: HelmRepository
        name: dexidp
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      runAsUser: 1000
    envFrom:
      - secretRef:
          name: dex-internal-secrets
    config:
      issuer: https://dex.whoverse.dev
      storage:
        type: kubernetes
        config:
          inCluster: true
      web:
        http: 0.0.0.0:5556
      oauth2:
        skipApprovalScreen: true
      connectors:
        - type: oidc
          id: authentik
          name: Authentik
          config:
            issuer: $AUTHENTIK_OIDC_DISCOVERY_URL
            clientID: $AUTHENTIK_CLIENT_ID
            clientSecret: $AUTHENTIK_CLIENT_SECRET
            redirectURI: https://dex.whoverse.dev/callback
            getUserInfo: true
            insecureEnableGroups: true
            scopes:
              - openid
              - email
              - profile
      staticClients:
        - id: kubernetes
          name: Kubernetes
          secretEnv: KUBERNETES_CLIENT_SECRET
          redirectURIs:
            - http://localhost:8000
            - http://localhost:18000
            - urn:ietf:wg:oauth:2.0:oob
            - https://headlamp.whoverse.dev/oidc-callback
        - id: envoy-internal
          name: Envoy Gateway Internal Services
          secretEnv: ENVOY_INTERNAL_CLIENT_SECRET
          redirectURIs:
            - https://ceph.whoverse.dev/oauth2/callback
            - https://mail.whoverse.dev/oauth2/callback
            - https://capacitor.whoverse.dev/oauth2/callback
        - id: grafana
          name: Grafana
          secretEnv: GRAFANA_CLIENT_SECRET
          redirectURIs:
            - https://grafana.whoverse.dev/login/generic_oauth
