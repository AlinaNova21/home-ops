---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegram-bot
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: telegram-bot
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: bot-telegram-whoversebot
        property: credential