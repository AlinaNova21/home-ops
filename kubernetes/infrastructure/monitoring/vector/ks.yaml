---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vector
  namespace: monitoring
spec:
  interval: 30m
  path: "./infrastructure/monitoring/vector/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: victoria-logs
  timeout: 10m
  wait: true
  prune: false
