---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: barman-cloud-plugin
  namespace: cnpg-system
spec:
  interval: 30m
  path: "./infrastructure/cnpg-system/barman-cloud-plugin/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: cloudnative-pg
  timeout: 10m
  wait: true
  prune: false
