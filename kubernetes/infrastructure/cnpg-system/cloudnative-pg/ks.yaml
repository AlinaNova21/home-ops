---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 30m
  path: "./infrastructure/cnpg-system/cloudnative-pg/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cloudnative-pg
      namespace: cnpg-system
  timeout: 10m
  wait: true
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-cluster
  namespace: cnpg-system
spec:
  interval: 30m
  path: "./infrastructure/cnpg-system/cloudnative-pg/config"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  dependsOn:
    - name: cloudnative-pg
    - name: barman-cloud-plugin
  timeout: 10m
  wait: true
  prune: true
