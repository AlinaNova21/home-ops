---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: databases
  labels:
    homelab.whoverse.dev/component: database
spec:
  instances: 2

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: backblaze-backup

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      wal_level: "replica"
      max_wal_size: "1GB"
      min_wal_size: "80MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
      log_connections: "on"
      log_disconnections: "on"
      log_lock_waits: "on"

  bootstrap:
    initdb:
      database: postgres
      owner: postgres

  storage:
    size: 50Gi
    storageClass: openebs-hostpath

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  monitoring:
    enablePodMonitor: true

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  managed:
    roles:
      - name: immich_user
        ensure: present
        login: true
        passwordSecret:
          name: immich-user-password
      - name: paperless_user
        ensure: present
        login: true
        passwordSecret:
          name: paperless-user-password
      - name: authentik_user
        ensure: present
        login: true
        passwordSecret:
          name: authentik-user-password
      - name: vikunja_user
        ensure: present
        login: true
        passwordSecret:
          name: vikunja-user-password
      - name: kasm_user
        ensure: present
        login: true
        passwordSecret:
          name: kasm-user-password

---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: immich-db
  namespace: databases
spec:
  name: immich
  owner: postgres
  cluster:
    name: homelab-postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: paperless-db
  namespace: databases
spec:
  name: paperless
  owner: postgres
  cluster:
    name: homelab-postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: authentik-db
  namespace: databases
spec:
  name: authentik
  owner: postgres
  cluster:
    name: homelab-postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: vikunja-db
  namespace: databases
spec:
  name: vikunja
  owner: postgres
  cluster:
    name: homelab-postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: kasm-db
  namespace: databases
spec:
  name: kasm
  owner: postgres
  cluster:
    name: homelab-postgres
