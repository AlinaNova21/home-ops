---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: homelab-postgres-daily
  namespace: databases
spec:
  # Daily at 3 AM UTC (seconds minute hour day month weekday)
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: homelab-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
