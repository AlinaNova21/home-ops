---
# Per-app secrets: include password (for CNPG managed roles), username, and host
# so the PushSecret can back a complete connection record to 1Password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-user-password
  namespace: databases
spec:
  refreshInterval: "0"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: immich-password-gen
  target:
    name: immich-user-password
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ .password }}"
        username: immich_user
        host: homelab-postgres-rw.databases.svc.cluster.local
