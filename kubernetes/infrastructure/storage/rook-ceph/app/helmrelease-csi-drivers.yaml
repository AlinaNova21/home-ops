---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: storage
spec:
  interval: 30m
  dependsOn:
    - name: rook-ceph-operator
  chart:
    spec:
      chart: ceph-csi-drivers
      version: "1.0.4"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: flux-system
  install:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    operatorConfig:
      namespace: storage
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        nodePlugin:
          priorityClassName: system-node-critical
        controllerPlugin:
          priorityClassName: system-cluster-critical
    drivers:
      rbd:
        enabled: true
        name: storage.rbd.csi.ceph.com
      cephfs:
        enabled: false
      nfs:
        enabled: false
      nvmeof:
        enabled: false
