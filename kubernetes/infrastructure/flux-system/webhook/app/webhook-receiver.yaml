---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: oci-webhook-receiver
  namespace: flux-system
spec:
  type: generic-hmac
  secretRef:
    name: webhook-token
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      name: home-ops
      namespace: flux-system
  suspend: false
