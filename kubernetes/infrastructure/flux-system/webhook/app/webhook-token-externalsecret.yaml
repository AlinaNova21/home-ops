---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webhook-token
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: webhook-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: flux-webhook-token
        property: credential
