apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: snapshot-controller
  namespace: kube-system
spec:
  interval: 15m
  path: ./infrastructure/kube-system/snapshot-controller
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  wait: true
  prune: true
