---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: descheduler
      version: "0.36.0"
      sourceRef:
        kind: HelmRepository
        name: home-operations-mirror
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    kind: CronJob
    schedule: "*/5 * * * *"
    deschedulerPolicy:
      profiles:
        - name: default
          pluginConfig:
            - name: LowNodeUtilization
              args:
                thresholds:
                  memory: 60
                  pods: 60
                targetThresholds:
                  memory: 80
                  pods: 80
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
