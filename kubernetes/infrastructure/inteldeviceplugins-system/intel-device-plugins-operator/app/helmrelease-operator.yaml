---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
  namespace: inteldeviceplugins-system
spec:
  interval: 30m
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: 0.36.0
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: false
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    manager:
      image:
        hub: intel
        tag: ""
      devices:
        gpu: true
    nodeSelector:
      kubernetes.io/arch: amd64
