---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr
  namespace: system-upgrade
spec:
  interval: 30m
  path: "./infrastructure/system-upgrade/tuppr/app"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: tuppr
      namespace: system-upgrade
  timeout: 10m
  wait: true
  prune: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr-config
  namespace: system-upgrade
spec:
  dependsOn:
    - name: tuppr
  interval: 30m
  path: "./infrastructure/system-upgrade/tuppr/config"
  sourceRef:
    kind: OCIRepository
    name: home-ops
    namespace: flux-system
  timeout: 5m
  wait: true
  prune: false
