# home-ops dev environment
# Install: https://mise.jdx.dev/getting-started.html
# Shell:   eval "$(mise activate bash)"   # add to ~/.bashrc / ~/.zshrc

[settings]
# [hooks] is currently experimental in mise; opt in so the postinstall hook
# runs after `mise install` (installs the helm-diff plugin + pre-commit hook).
experimental = true

[env]
_.file = ".env"
# KUBECONFIG and TALOSCONFIG point at the 'whoverse' cluster; override per-shell
# if working elsewhere (e.g., `KUBECONFIG=/path/to/other mise exec -- kubectl ...`).
KUBECONFIG  = "{{config_root}}/kubeconfig.yaml"
TALOSCONFIG = "{{config_root}}/talos/whoverse/clusterconfig/talosconfig"

[tools]
# Talos
talosctl   = "latest"
talhelper  = "latest"

# Kubernetes
kubectl    = "1.36.3"
helm       = "4.2.3"
helmfile   = "1.5.2"
flux2      = "2.8.8"
cilium-cli = "0.19.6"
k9s        = "0.50.18"

# Secrets
sops = "3.13.3"
age  = "1.3.1"

# Utilities
just = "1.51.0"
jq   = "1.8.2"
yq   = "4.53.2"

# Pre-commit + secret scanners (managed by pre-commit hooks)
pre-commit = "latest"
gitleaks   = "latest"
trufflehog = "latest"
"aqua:k8sgpt-ai/k8sgpt" = "latest"
kopia = "latest"

[hooks]
# Install the helm-diff plugin (mise manages binaries, not helm plugins).
# `--verify=false` because the plugin repo isn't signed; idempotent because
# `helm plugin install` exits non-zero if already installed.
# Also installs the pre-commit hook via the hooks:install task (gated on a
# `.git` entry — directory in the main checkout, file in worktrees).
postinstall = "helm plugin install --verify=false https://github.com/databus23/helm-diff 2>/dev/null && echo 'helm-diff plugin installed' || echo 'helm-diff plugin install skipped (network or already present)'; if [ -d .git ] || [ -f .git ]; then mise run hooks:install; else echo 'pre-commit install skipped (no .git metadata)'; fi"

[tasks."hooks:install"]
description = "Install the local pre-commit Git hook using mise-pinned pre-commit"
run = [
  'pre-commit install --install-hooks --overwrite',
]

[tasks."secrets:env"]
description = "Inject 1Password secrets from .op.env into .env"
run = ['op inject -i .op.env -o .env']

[tasks."kopia:connect"]
description = "Connect workstation kopia CLI to the kopiur cluster repository (requires `mise run secrets:env` first)"
run = [
  'kopia repository connect s3 --endpoint=s3.us-west-001.backblazeb2.com --region=us-west-001 --bucket=whoverse-k8s-backups --prefix=kopiur',
]
